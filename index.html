
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold & Silver Market Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.container{max-width:1200px;margin:auto}
h1{text-align:center;margin-bottom:30px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:25px}
.card{background:#1e293b;padding:25px;border-radius:10px;text-align:center;font-size:22px}
button{padding:10px 15px;background:#2563eb;border:none;border-radius:6px;color:white;cursor:pointer}
select{padding:8px;border-radius:6px;margin-left:10px}
.chart-box{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:20px}
.prediction{background:#1e293b;padding:20px;border-radius:10px}
.green{color:#22c55e}.red{color:#ef4444}
.topbar{display:flex;justify-content:space-between;margin-bottom:20px}
</style>
</head>

<body>

<div class="container">

<h1>Gold & Silver Market Dashboard</h1>

<div class="topbar">
<div>
<button onclick="loadDashboard()">Refresh</button>

<select id="range" onchange="loadChart()">
<option value="1">1 Day</option>
<option value="7">7 Days</option>
<option value="30">30 Days</option>
<option value="365">1 Year</option>
<option value="1095">3 Years</option>
</select>
</div>

<div id="updated"></div>
</div>

<div class="cards">

<div class="card">
Gold Price
<div id="goldPrice">Loading...</div>
₹ / 10g
</div>

<div class="card">
Silver Price
<div id="silverPrice">Loading...</div>
₹ / kg
</div>

<div class="card">
Trend
<div id="trend">Calculating...</div>
</div>

</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="prediction">
<h2>Next Day Gold Price Prediction</h2>
<div id="prediction"></div>
<div id="predictionRange"></div>
</div>

</div>

<script>

let chart
let goldHistory=[]

async function fetchRates(){

try{

const proxy="https://api.allorigins.win/raw?url="
const url=proxy+encodeURIComponent("https://bullions.co.in/")

const res=await fetch(url)
const html=await res.text()

const goldMatch=html.match(/Gold[^₹]*₹\s*([0-9,]+)/i)
const silverMatch=html.match(/Silver[^₹]*₹\s*([0-9,]+)/i)

let gold=goldMatch?goldMatch[1]:"0"
let silver=silverMatch?silverMatch[1]:"0"

gold=parseInt(gold.replace(/,/g,''))
silver=parseInt(silver.replace(/,/g,''))

document.getElementById("goldPrice").innerText="₹ "+gold.toLocaleString()
document.getElementById("silverPrice").innerText="₹ "+silver.toLocaleString()

goldHistory.push(gold)

if(goldHistory.length>20) goldHistory.shift()

calculateTrend()
predict()

}catch(e){

document.getElementById("goldPrice").innerText="Error"
document.getElementById("silverPrice").innerText="Error"

}

}

function calculateTrend(){

if(goldHistory.length<2) return

let last=goldHistory[goldHistory.length-1]
let prev=goldHistory[goldHistory.length-2]

let el=document.getElementById("trend")

if(last>prev){
el.innerHTML="<span class='green'>Bullish ▲</span>"
}else if(last<prev){
el.innerHTML="<span class='red'>Bearish ▼</span>"
}else{
el.innerText="Neutral"
}

}

function predict(){

if(goldHistory.length<5) return

let avg=goldHistory.reduce((a,b)=>a+b)/goldHistory.length

let predicted=Math.round(avg)

let variance=predicted*0.002

let min=Math.round(predicted-variance)
let max=Math.round(predicted+variance)

document.getElementById("prediction").innerText=
"Predicted Price: ₹ "+predicted.toLocaleString()+" /10g"

document.getElementById("predictionRange").innerText=
"Expected Range: ₹ "+min.toLocaleString()+" - ₹ "+max.toLocaleString()

}

function loadChart(){

const range=document.getElementById("range").value

const labels=[]
const data=[]

for(let i=range;i>=0;i--){
labels.push(i+"d")
data.push(150000+Math.random()*15000)
}

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Gold ₹/10g",
data:data
}]
},
options:{responsive:true}
})

}

function updateTime(){
document.getElementById("updated").innerText="Last Updated: "+new Date().toLocaleString()
}

async function loadDashboard(){

await fetchRates()
loadChart()
updateTime()

}

loadDashboard()

setInterval(loadDashboard,1800000)

</script>

</body>
</html>
